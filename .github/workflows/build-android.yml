name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app with correct base path
        run: npm run build
        env:
          BASE_PATH: "./"

      - name: Setup Android platform
        run: |
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android

      - name: Fix AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />|' "$MANIFEST"
          fi
          if ! grep -q "usesCleartextTraffic" "$MANIFEST"; then
            sed -i 's|android:label="@string/app_name"|android:label="@string/app_name"\n        android:usesCleartextTraffic="true"|' "$MANIFEST"
          fi

      - name: Replace MainActivity
        run: |
          if [ -f MainActivity.java ]; then
            TARGET=$(find android/app/src/main/java -name 'MainActivity.java' | head -n 1)
            cp MainActivity.java "$TARGET"
          fi

      - name: Final sync
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: ClowtheX-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
