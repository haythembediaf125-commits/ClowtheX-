name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Fix AndroidManifest permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml

          # إضافة صلاحية الكاميرا
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />|' "$MANIFEST"
          fi

          # تفعيل cleartext traffic
          if ! grep -q "usesCleartextTraffic" "$MANIFEST"; then
            sed -i 's|android:label="@string/app_name"|android:label="@string/app_name"\n        android:usesCleartextTraffic="true"|' "$MANIFEST"
          fi

          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      - name: Create network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF

      - name: Copy MainActivity if exists
        run: |
          if [ -f MainActivity.java ]; then
            TARGET=$(find android/app/src/main/java -name 'MainActivity.java' | head -n 1)
            if [ -n "$TARGET" ]; then
              cp MainActivity.java "$TARGET"
              echo "Replaced: $TARGET"
            fi
          fi

      - name: Final cap sync
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClowtheX-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
